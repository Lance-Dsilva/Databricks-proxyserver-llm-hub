services:

  proxy:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      DB_PATH: /app/data/db.sqlite
    volumes:
      - db_data:/app/data
    networks:
      - platform_network
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  platform:
    build:
      context: ./backend
      dockerfile: Dockerfile.platform
    ports:
      - "127.0.0.1:8001:8001"
    env_file: .env
    environment:
      DB_PATH: /app/data/db.sqlite
    volumes:
      - db_data:/app/data
    networks:
      - platform_network
    restart: always
    depends_on:
      proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      PLATFORM_URL: http://platform:8001
      PROXY_BASE: http://localhost:8000
    networks:
      - platform_network
    restart: always
    depends_on:
      platform:
        condition: service_healthy

volumes:
  db_data:

networks:
  platform_network:
    driver: bridge
